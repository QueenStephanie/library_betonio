<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QueenLib | Register</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Outfit:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="auth.css">
</head>

<body>
  <main class="auth-page">
    <section class="auth-visual">
      <div class="visual-overlay"></div>
      <div class="visual-content">
        <a class="visual-brand" href="index.html">QueenLib</a>
        <p class="visual-quote">"Reading is to the mind what exercise is to the body."</p>
      </div>
    </section>

    <section class="auth-panel">
      <div class="auth-card">
        <h1>Create your account</h1>
        <p class="subtitle">Join QueenLib and start exploring your library.</p>

        <form class="auth-form" id="registerForm">
          <label for="first_name">First Name</label>
          <input id="first_name" name="first_name" type="text" placeholder="Jane" autocomplete="given-name" required>

          <label for="last_name">Last Name</label>
          <input id="last_name" name="last_name" type="text" placeholder="Austen" autocomplete="family-name" required>

          <label for="email">Email Address</label>
          <input id="email" name="email" type="email" placeholder="jane@example.com" autocomplete="email" required>

          <label for="password">Password</label>
          <div class="password-field">
            <input id="password" name="password" type="password" placeholder="At least 8 characters"
              autocomplete="new-password" required>
            <button class="toggle-password" type="button" aria-label="Show password" aria-pressed="false">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path
                  d="M12 5c5.23 0 9.27 4.57 10 6c-.73 1.43-4.77 6-10 6S2.73 12.43 2 11c.73-1.43 4.77-6 10-6Zm0 2c-3.93 0-7.16 3.11-7.88 4c.72.89 3.95 4 7.88 4s7.16-3.11 7.88-4C19.16 10.11 15.93 7 12 7Zm0 1.5A3.5 3.5 0 1 1 8.5 12A3.5 3.5 0 0 1 12 8.5Zm0 2A1.5 1.5 0 1 0 13.5 12A1.5 1.5 0 0 0 12 10.5Z" />
              </svg>
            </button>
          </div>

          <label for="password_confirm">Confirm Password</label>
          <div class="password-field">
            <input id="password_confirm" name="password_confirm" type="password" placeholder="Repeat your password"
              autocomplete="new-password" required>
            <button class="toggle-password" type="button" aria-label="Show password" aria-pressed="false">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path
                  d="M12 5c5.23 0 9.27 4.57 10 6c-.73 1.43-4.77 6-10 6S2.73 12.43 2 11c.73-1.43 4.77-6 10-6Zm0 2c-3.93 0-7.16 3.11-7.88 4c.72.89 3.95 4 7.88 4s7.16-3.11 7.88-4C19.16 10.11 15.93 7 12 7Zm0 1.5A3.5 3.5 0 1 1 8.5 12A3.5 3.5 0 0 1 12 8.5Zm0 2A1.5 1.5 0 1 0 13.5 12A1.5 1.5 0 0 0 12 10.5Z" />
              </svg>
            </button>
          </div>

          <button class="submit-button" type="submit">Create Account</button>
        </form>

        <div class="auth-links">
          <p>Already have an account? <a class="register-link" href="login.html">Log in →</a></p>
        </div>
      </div>
    </section>
  </main>

  <script src="auth.js"></script>
  <script>
    // Handle registration form submission
    async function handleRegister(event) {
      event.preventDefault();

      const first_name = document.getElementById('first_name').value.trim();
      const last_name = document.getElementById('last_name').value.trim();
      const email = document.getElementById('email').value.trim().toLowerCase();
      const password = document.getElementById('password').value;
      const password_confirm = document.getElementById('password_confirm').value;

      // Validate all fields before sending
      if (!first_name) {
        alert('❌ Please enter your first name');
        document.getElementById('first_name').focus();
        return;
      }
      if (!last_name) {
        alert('❌ Please enter your last name');
        document.getElementById('last_name').focus();
        return;
      }
      if (!email) {
        alert('❌ Please enter your email');
        document.getElementById('email').focus();
        return;
      }
      if (!password) {
        alert('❌ Please enter a password');
        document.getElementById('password').focus();
        return;
      }
      if (!password_confirm) {
        alert('❌ Please confirm your password');
        document.getElementById('password_confirm').focus();
        return;
      }

      // Validate passwords match
      if (password !== password_confirm) {
        alert('❌ Passwords do not match');
        document.getElementById('password').focus();
        return;
      }

      // Validate password length
      if (password.length < 8) {
        alert('❌ Password must be at least 8 characters long');
        document.getElementById('password').focus();
        return;
      }

      const formData = {
        first_name: first_name,
        last_name: last_name,
        email: email,
        password: password,
        password_confirm: password_confirm
      };

      console.log('Sending registration data:', formData);

      try {
        const response = await fetch('/library_betonio/backend/api/register.php', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(formData)
        });

        console.log('Response status:', response.status);
        const data = await response.json();
        console.log('Response data:', data);

        if (data.success) {
          // Store email in session for verification page
          sessionStorage.setItem('registrationEmail', email);

          alert('✅ Registration successful! Check your email for OTP code.');
          window.location.href = '/library_betonio/pages/auth/verify-email.html?' +
            'email=' + encodeURIComponent(email);
        } else {
          alert('❌ Registration Error: ' + (data.error || 'Unknown error. Please try again.'));
          console.error('Server error:', data);
        }
      } catch (error) {
        console.error('Registration error:', error);
        alert('❌ Registration failed. Please check the console (F12) for details.\n\nError: ' + error.message);
      }
    }

    // Attach form handler
    document.getElementById('registerForm').addEventListener('submit', handleRegister);

    // Debug: Show form fields on load
    window.addEventListener('load', () => {
      console.log('Form fields loaded:');
      console.log('first_name:', document.getElementById('first_name')?.value || 'NOT FOUND');
      console.log('last_name:', document.getElementById('last_name')?.value || 'NOT FOUND');
      console.log('email:', document.getElementById('email')?.value || 'NOT FOUND');
      console.log('password:', document.getElementById('password')?.value || 'NOT FOUND');
      console.log('password_confirm:', document.getElementById('password_confirm')?.value || 'NOT FOUND');
      console.log('registerForm:', document.getElementById('registerForm') ? 'EXISTS' : 'NOT FOUND');
    });
  </script>
</body>

</html>
