<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QueenLib | Forgot Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Outfit:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="../../public/css/auth.css">
</head>

<body>
  <main class="auth-page">
    <!-- Visual Section -->
    <section class="auth-visual" aria-label="App branding">
      <div class="visual-overlay"></div>
      <div class="visual-content">
        <a class="visual-brand" href="../../index.html">QueenLib</a>
        <p class="visual-quote">"Every end is a new beginning."</p>
      </div>
    </section>

    <!-- Form Section -->
    <section class="auth-panel">
      <div class="auth-card auth-card-compact">
        <a class="back-link" href="login.html">← Back to Login</a>
        <h1>Forgot your password?</h1>
        <p class="subtitle">Enter your email address and we'll send you a link to reset your password.</p>

        <!-- Backend: Form for password reset request -->
        <form class="auth-form" id="forgotPasswordForm" data-form-type="forgot-password"
          data-api-endpoint="/api/auth/forgot-password" action="reset-sent.html" method="post">

          <!-- Email Field -->
          <label for="forgot-email">Email Address</label>
          <input id="forgot-email" name="email" type="email" placeholder="jane@example.com" autocomplete="email"
            required data-validation="email">

          <!-- Submit Button -->
          <button class="submit-button button-icon" type="submit">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M3 5h18a1 1 0 0 1 1 1v12a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1Zm0 2v.51l9 5.4l9-5.4V7H3Zm18 10V9.81l-8.5 5.1a1 1 0 0 1-1.02 0L3 9.81V17h18Z" />
            </svg>
            Send Reset Link
          </button>
        </form>
      </div>
    </section>
  </main>

  <!-- Config & Scripts -->
  <script src="../../config/api.config.js"></script>
  <script src="../../public/js/auth.js"></script>
</body>

</html>
