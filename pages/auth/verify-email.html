<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify Email - Library Betonio</title>
  <link rel="stylesheet" href="../../public/css/auth.css">
  <style>
    .otp-input-container {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 30px 0;
    }

    .otp-input-field {
      width: 50px;
      height: 50px;
      font-size: 24px;
      font-weight: bold;
      text-align: center;
      border: 2px solid #ccc;
      border-radius: 8px;
      padding: 0;
      transition: all 0.3s ease;
    }

    .otp-input-field:hover {
      border-color: #3498db;
    }

    .otp-input-field:focus {
      outline: none;
      border-color: #3498db;
      box-shadow: 0 0 10px rgba(52, 152, 219, 0.3);
    }

    .otp-input-field.filled {
      background-color: #f0f7ff;
    }

    .timer {
      text-align: center;
      font-size: 14px;
      color: #7f8c8d;
      margin: 20px 0;
    }

    .timer.warning {
      color: #e74c3c;
      font-weight: bold;
    }

    .resend-section {
      text-align: center;
      margin-top: 20px;
    }

    .resend-btn {
      background-color: transparent;
      border: none;
      color: #3498db;
      cursor: pointer;
      text-decoration: underline;
      font-size: 14px;
      padding: 0;
    }

    .resend-btn:hover {
      color: #2980b9;
    }

    .resend-btn:disabled {
      color: #bdc3c7;
      cursor: not-allowed;
      text-decoration: none;
    }

    .error-message {
      color: #e74c3c;
      text-align: center;
      margin: 15px 0;
      padding: 12px;
      background-color: #fadbd8;
      border-left: 4px solid #e74c3c;
      border-radius: 4px;
      display: none;
    }

    .success-message {
      color: #27ae60;
      text-align: center;
      margin: 15px 0;
      padding: 12px;
      background-color: #d5f4e6;
      border-left: 4px solid #27ae60;
      border-radius: 4px;
      display: none;
    }

    .info-box {
      background-color: #e3f2fd;
      border-left: 4px solid #2196f3;
      padding: 15px;
      margin: 20px 0;
      border-radius: 4px;
      font-size: 14px;
      color: #1565c0;
    }
  </style>
</head>

<body>
  <div class="auth-page">
    <section class="auth-panel">
      <div class="auth-card">
        <h1>Verify Your Email</h1>
        <p>Enter the 6-digit OTP sent to your email address</p>

        <div class="error-message" id="errorMessage"></div>
        <div class="success-message" id="successMessage"></div>

        <form id="otpForm">
          <div class="info-box">
            <strong>Email:</strong> <span id="emailDisplay"></span>
          </div>

          <label>Enter OTP Code</label>
          <div class="otp-input-container">
            <input type="text" class="otp-input-field" maxlength="1" inputmode="numeric" data-index="0" placeholder="0">
            <input type="text" class="otp-input-field" maxlength="1" inputmode="numeric" data-index="1" placeholder="0">
            <input type="text" class="otp-input-field" maxlength="1" inputmode="numeric" data-index="2" placeholder="0">
            <input type="text" class="otp-input-field" maxlength="1" inputmode="numeric" data-index="3" placeholder="0">
            <input type="text" class="otp-input-field" maxlength="1" inputmode="numeric" data-index="4" placeholder="0">
            <input type="text" class="otp-input-field" maxlength="1" inputmode="numeric" data-index="5" placeholder="0">
          </div>

          <div class="timer">
            <span id="timerText">Expires in: <span id="timeRemaining">10:00</span></span>
          </div>

          <button type="submit" id="verifyBtn" class="submit-button">Verify Email</button>
        </form>

        <div class="resend-section">
          <p>Didn't receive the OTP?</p>
          <button type="button" id="resendBtn" class="resend-btn">Resend OTP</button>
          <p style="font-size: 12px; color: #7f8c8d; margin-top: 10px;">
            You can request a new OTP after <span id="resendTimer">60</span> seconds
          </p>
        </div>

        <div style="text-align: center; margin-top: 30px;">
          <p>
            <a href="login.html" style="color: #3498db; text-decoration: none;">Back to Login</a>
          </p>
        </div>
      </div>
    </section>
  </div>

  <script>
    class OTPVerification {
      constructor() {
        this.otpInputs = document.querySelectorAll('.otp-input-field');
        this.form = document.getElementById('otpForm');
        this.verifyBtn = document.getElementById('verifyBtn');
        this.resendBtn = document.getElementById('resendBtn');
        this.errorMessage = document.getElementById('errorMessage');
        this.successMessage = document.getElementById('successMessage');
        this.emailDisplay = document.getElementById('emailDisplay');
        this.otpValidity = 600;
        this.resendDelay = 60;
        this.lastResendTime = 0;

        this.init();
      }

      init() {
        this.email = this.getEmail();

        if (!this.email) {
          this.showError('Email not found. Please register first.');
          return;
        }

        this.emailDisplay.textContent = this.email;

        this.otpInputs.forEach((input, index) => {
          input.addEventListener('input', (e) => this.handleOTPInput(e, index));
          input.addEventListener('keydown', (e) => this.handleKeyDown(e, index));
          input.addEventListener('paste', (e) => this.handlePaste(e));
        });

        this.form.addEventListener('submit', (e) => this.handleSubmit(e));
        this.resendBtn.addEventListener('click', () => this.handleResend());

        this.startOTPTimer();
        this.startResendTimer();
      }

      getEmail() {
        const params = new URLSearchParams(window.location.search);
        let email = params.get('email');

        if (!email) {
          email = sessionStorage.getItem('registrationEmail');
        }

        if (!email) {
          email = localStorage.getItem('pendingVerificationEmail');
        }

        return email || '';
      }

      handleOTPInput(e, index) {
        const input = e.target;
        const value = input.value;

        if (!/^\d?$/.test(value)) {
          input.value = '';
          return;
        }

        if (value) {
          input.classList.add('filled');
          if (index < this.otpInputs.length - 1) {
            this.otpInputs[index + 1].focus();
          }
        } else {
          input.classList.remove('filled');
        }
      }

      handleKeyDown(e, index) {
        if (e.key === 'Backspace') {
          e.preventDefault();
          const input = e.target;
          input.value = '';
          input.classList.remove('filled');

          if (index > 0) {
            this.otpInputs[index - 1].focus();
          }
        }
      }

      handlePaste(e) {
        e.preventDefault();
        const pastedData = e.clipboardData.getData('text');
        const digits = pastedData.replace(/\D/g, '');

        for (let i = 0; i < Math.min(digits.length, this.otpInputs.length); i++) {
          this.otpInputs[i].value = digits[i];
          this.otpInputs[i].classList.add('filled');
        }

        if (digits.length >= this.otpInputs.length) {
          this.otpInputs[this.otpInputs.length - 1].focus();
        }
      }

      getOTPCode() {
        return Array.from(this.otpInputs).map(input => input.value).join('');
      }

      async handleSubmit(e) {
        e.preventDefault();

        const otpCode = this.getOTPCode();

        if (otpCode.length !== 6) {
          this.showError('Please enter all 6 digits');
          return;
        }

        this.verifyBtn.disabled = true;
        this.verifyBtn.textContent = 'Verifying...';

        try {
          const response = await fetch('../../backend/api/verify-otp.php', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              email: this.email,
              otp_code: otpCode
            })
          });

          const data = await response.json();

          if (data.success) {
            this.showSuccess('Email verified successfully! Redirecting...');

            sessionStorage.removeItem('registrationEmail');
            localStorage.removeItem('pendingVerificationEmail');

            setTimeout(() => {
              window.location.href = 'login.html';
            }, 2000);
          } else {
            this.showError(data.error || 'Verification failed. Please try again.');

            this.otpInputs.forEach(input => {
              input.value = '';
              input.classList.remove('filled');
            });

            this.otpInputs[0].focus();
          }
        } catch (error) {
          console.error('Error:', error);
          this.showError('Network error. Please try again.');
        } finally {
          this.verifyBtn.disabled = false;
          this.verifyBtn.textContent = 'Verify Email';
        }
      }

      async handleResend() {
        const now = Date.now();

        if (now - this.lastResendTime < this.resendDelay * 1000) {
          this.showError('Please wait before requesting another OTP');
          return;
        }

        this.resendBtn.disabled = true;

        try {
          const response = await fetch('../../backend/api/resend-otp.php', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              email: this.email
            })
          });

          const data = await response.json();

          if (data.success) {
            this.showSuccess('OTP resent successfully to your email');
            this.lastResendTime = now;
            this.startOTPTimer();
            this.startResendTimer();
          } else {
            this.showError(data.error || 'Failed to resend OTP');
          }
        } catch (error) {
          console.error('Error:', error);
          this.showError('Network error. Please try again.');
        } finally {
          this.resendBtn.disabled = false;
        }
      }

      startOTPTimer() {
        let timeRemaining = this.otpValidity;
        const timerElement = document.getElementById('timeRemaining');
        const timerContainer = document.querySelector('.timer');

        const updateTimer = () => {
          const minutes = Math.floor(timeRemaining / 60);
          const seconds = timeRemaining % 60;
          timerElement.textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;

          if (timeRemaining <= 60) {
            timerContainer.classList.add('warning');
          }

          if (timeRemaining <= 0) {
            this.showError('OTP has expired. Please request a new one.');
            this.verifyBtn.disabled = true;
            return;
          }

          timeRemaining--;
          setTimeout(updateTimer, 1000);
        };

        updateTimer();
      }

      startResendTimer() {
        let timeRemaining = this.resendDelay;
        const timerElement = document.getElementById('resendTimer');

        const updateTimer = () => {
          timerElement.textContent = timeRemaining;

          if (timeRemaining <= 0) {
            this.resendBtn.disabled = false;
            return;
          }

          timeRemaining--;
          setTimeout(updateTimer, 1000);
        };

        updateTimer();
      }

      showError(message) {
        this.errorMessage.textContent = message;
        this.errorMessage.style.display = 'block';
        this.successMessage.style.display = 'none';
        setTimeout(() => {
          this.errorMessage.style.display = 'none';
        }, 5000);
      }

      showSuccess(message) {
        this.successMessage.textContent = message;
        this.successMessage.style.display = 'block';
        this.errorMessage.style.display = 'none';
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      new OTPVerification();
    });
  </script>
</body>

</html>
