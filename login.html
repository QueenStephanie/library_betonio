<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QueenLib | Log In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Outfit:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="auth.css">
</head>

<body>
  <main class="auth-page">
    <section class="auth-visual">
      <div class="visual-overlay"></div>
      <div class="visual-content">
        <a class="visual-brand" href="index.html">QueenLib</a>
        <p class="visual-quote">"A reader lives a thousand lives before he dies."</p>
      </div>
    </section>

    <section class="auth-panel">
      <div class="auth-card">
        <h1>Welcome back</h1>
        <p class="subtitle">Sign in to your QueenLib account.</p>

        <form class="auth-form" id="loginForm">
          <label for="email">Email Address</label>
          <input id="email" name="email" type="email" placeholder="jane@example.com" autocomplete="email" required>

          <label for="password">Password</label>
          <div class="password-field">
            <input id="password" name="password" type="password" placeholder="Your password"
              autocomplete="current-password" required>
            <button class="toggle-password" type="button" aria-label="Show password" aria-pressed="false">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path
                  d="M12 5c5.23 0 9.27 4.57 10 6c-.73 1.43-4.77 6-10 6S2.73 12.43 2 11c.73-1.43 4.77-6 10-6Zm0 2c-3.93 0-7.16 3.11-7.88 4c.72.89 3.95 4 7.88 4s7.16-3.11 7.88-4C19.16 10.11 15.93 7 12 7Zm0 1.5A3.5 3.5 0 1 1 8.5 12A3.5 3.5 0 0 1 12 8.5Zm0 2A1.5 1.5 0 1 0 13.5 12A1.5 1.5 0 0 0 12 10.5Z" />
              </svg>
            </button>
          </div>

          <button class="submit-button" type="submit">Log In</button>
        </form>

        <div class="auth-links">
          <a class="forgot-link" href="forgot-password.html">Forgot your password?</a>
          <p>Don't have an account? <a class="register-link" href="register.html">Register →</a></p>
        </div>
      </div>
    </section>
  </main>

  <script src="auth.js"></script>
  <script>
    // Handle login form submission
    async function handleLogin(event) {
      event.preventDefault();

      const formData = {
        email: document.getElementById('email').value.trim().toLowerCase(),
        password: document.getElementById('password').value
      };

      try {
        const response = await fetch('/library_betonio/backend/api/login.php', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(formData)
        });

        const data = await response.json();

        if (data.success) {
          // Store user data in session
          sessionStorage.setItem('user', JSON.stringify(data.user));
          sessionStorage.setItem('userId', data.user.id);

          alert('✅ Login successful!');
          window.location.href = '/library_betonio/pages/dashboard/account.html';
        } else {
          if (data.error && data.error.includes('verified')) {
            alert('⚠️ Please verify your email first');
            window.location.href = '/library_betonio/pages/auth/verify-email.html?' +
              'email=' + encodeURIComponent(formData.email);
          } else {
            alert('❌ ' + (data.error || 'Login failed'));
          }
        }
      } catch (error) {
        console.error('Login error:', error);
        alert('❌ Login failed. Please try again.');
      }
    }

    // Attach form handler
    document.getElementById('loginForm').addEventListener('submit', handleLogin);
  </script>
</body>

</html>
