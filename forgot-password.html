<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QueenLib | Forgot Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Outfit:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="auth.css">
</head>

<body>
  <main class="auth-page">
    <section class="auth-visual">
      <div class="visual-overlay"></div>
      <div class="visual-content">
        <a class="visual-brand" href="index.html">QueenLib</a>
        <p class="visual-quote">"Every end is a new beginning."</p>
      </div>
    </section>

    <section class="auth-panel">
      <div class="auth-card auth-card-compact">
        <a class="back-link" href="login.html">← Back to Login</a>
        <h1>Forgot your password?</h1>
        <p class="subtitle">Enter your email address and we'll send you a link to reset your password.</p>

        <form class="auth-form" id="forgotForm">
          <label for="email">Email Address</label>
          <input id="email" name="email" type="email" placeholder="jane@example.com" autocomplete="email" required>

          <button class="submit-button button-icon" type="submit">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M3 5h18a1 1 0 0 1 1 1v12a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1Zm0 2v.51l9 5.4l9-5.4V7H3Zm18 10V9.81l-8.5 5.1a1 1 0 0 1-1.02 0L3 9.81V17h18Z" />
            </svg>
            Send Reset Link
          </button>
        </form>
      </div>
    </section>
  </main>

  <script>
    // Handle forgot password form submission
    async function handleForgotPassword(event) {
      event.preventDefault();

      const email = document.getElementById('email').value.trim().toLowerCase();

      try {
        const response = await fetch('/library_betonio/backend/api/forgot-password.php', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ email })
        });

        const data = await response.json();

        // Always show success message for security (don't reveal if email exists)
        alert('✅ If an account exists with this email, a password reset link has been sent.');

        // Redirect after 2 seconds
        setTimeout(() => {
          window.location.href = '/library_betonio/login.html';
        }, 2000);

      } catch (error) {
        console.error('Forgot password error:', error);
        alert('❌ Request failed. Please try again.');
      }
    }

    // Attach form handler
    document.getElementById('forgotForm').addEventListener('submit', handleForgotPassword);
  </script>
</body>

</html>
