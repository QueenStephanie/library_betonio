<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QueenLib | Reset Sent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Outfit:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="auth.css">
</head>

<body>
  <main class="auth-page">
    <section class="auth-visual">
      <div class="visual-overlay"></div>
      <div class="visual-content">
        <a class="visual-brand" href="index.html">QueenLib</a>
        <p class="visual-quote">"Reading is to the mind what exercise is to the body."</p>
      </div>
    </section>

    <section class="auth-panel">
      <div class="auth-card auth-card-center auth-card-compact">
        <div class="mail-icon" aria-hidden="true">
          <svg viewBox="0 0 72 52">
            <rect x="1" y="5" width="70" height="46" rx="8" fill="#eadbff"></rect>
            <path d="M4 10l31.2 22.5a1.5 1.5 0 0 0 1.76 0L68 10" fill="none" stroke="#d2b8f7" stroke-width="2.5"></path>
            <path d="M4 47l22-18" fill="none" stroke="#d9c3f7" stroke-width="2.5"></path>
            <path d="M68 47L46 29" fill="none" stroke="#d9c3f7" stroke-width="2.5"></path>
          </svg>
        </div>
        <h2>Password reset email sent</h2>
        <p class="subtitle">Check your email for a link to reset your password.</p>
        <p class="subtitle">If you don't see the email, check your spam folder.</p>
        <a class="submit-button" href="login.html">Back to Login</a>
      </div>
    </section>
  </main>
</body>

</html>
